services:
  pocket-budget:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pocket-budget
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/app/data/dev.db
      AUTH_BOOTSTRAP_USERNAME: ${AUTH_BOOTSTRAP_USERNAME:-}
      AUTH_BOOTSTRAP_PASSWORD: ${AUTH_BOOTSTRAP_PASSWORD:-}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-change_me_now}
      AUTH_SECRET: ${AUTH_SECRET:-change_me_auth_secret}
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - pocket_budget_data:/app/data

volumes:
  pocket_budget_data:
